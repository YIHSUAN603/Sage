name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04 # .deb / .rpm / .AppImage
            args: ''
          - platform: windows-latest # .msi / .exe
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS runner 需要同時具備兩種 target 才能交叉建置 Intel 版
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libdbus-1-dev pkg-config libxcb1-dev libxrandr-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      # macOS codesign 用的自簽憑證：讓 App 有「固定」的簽章身分，TCC 授權
      # （輔助使用 / 資料夾存取）才能跨啟動、跨改版保留，否則 tccd 每次都對不回
      # 先前的授權而重跳權限。憑證由 scripts/gen-selfsigned-cert.sh 產生一次後存為
      # secrets。這裡「自己」建 keychain 並匯入，而非交給 tauri-action 內建匯入，
      # 因為自簽憑證匯入後預設 NOT_TRUSTED，必須額外 add-trusted-cert 設為 code
      # signing 可信根，codesign 才願意用 identity 名稱簽章。
      - name: Import self-signed signing certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sage-signing.keychain-db"
          P12="$RUNNER_TEMP/sage-cert.p12"
          CER="$RUNNER_TEMP/sage-cert.pem"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$P12"
          # 臨時 keychain：建立、設定 6h 不自動上鎖、解鎖、排進搜尋清單最前面
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          # 匯入私鑰+憑證並授權 codesign 取用（p12 須為 -legacy 格式，security 才讀得了）
          security import "$P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # 自簽憑證匯入後預設 NOT_TRUSTED，codesign 會拒用其 identity 名稱。從
          # keychain 匯出公開憑證（不經 openssl，避開其 legacy p12 相容性問題），
          # 設為 code signing 可信根後 identity 才會 valid。
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p "$KEYCHAIN" > "$CER"
          security add-trusted-cert -r trustRoot -p codeSign -k "$KEYCHAIN" "$CER"
          rm -f "$P12" "$CER"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 用上一步匯入的自簽 identity 簽章。刻意不設 APPLE_CERTIFICATE（避免
          # tauri-action 再做一次未設信任的匯入）與 APPLE_ID/APPLE_TEAM_ID（自簽
          # 無法公證；Gatekeeper 隔離仍靠 Homebrew cask 的 xattr 清除）。此變數在
          # Linux/Windows runner 上為空，Tauri 會忽略。
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: v__VERSION__
          releaseName: 'Sage v__VERSION__'
          releaseBody: |
            請至下方 Assets 下載對應平台的安裝檔。

            **macOS 建議使用 Homebrew 安裝**（cask 會自動清除隔離標記，免除 Gatekeeper「已損毀」問題）：

            ```
            brew install --cask YIHSUAN603/tap/sage
            ```

            （名稱需完整寫 `YIHSUAN603/tap/sage`，因官方另有同名的 SageMath cask）

            > 若直接下載 dmg：macOS 版尚未經 Apple 簽章，開啟前請先在終端機執行
            > `xattr -cr /Applications/sage.app` 移除隔離標記，否則會顯示「已損毀，無法打開」。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
