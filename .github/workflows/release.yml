name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04 # .deb / .rpm / .AppImage
            args: ''
          - platform: windows-latest # .msi / .exe
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS runner 需要同時具備兩種 target 才能交叉建置 Intel 版
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libdbus-1-dev pkg-config libxcb1-dev libxrandr-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Sage v__VERSION__'
          releaseBody: |
            請至下方 Assets 下載對應平台的安裝檔。

            **macOS 建議使用 Homebrew 安裝**（cask 會自動清除隔離標記，免除 Gatekeeper「已損毀」問題）：

            ```
            brew install --cask YIHSUAN603/tap/sage
            ```

            （名稱需完整寫 `YIHSUAN603/tap/sage`，因官方另有同名的 SageMath cask）

            > 若直接下載 dmg：macOS 版尚未經 Apple 簽章，開啟前請先在終端機執行
            > `xattr -cr /Applications/sage.app` 移除隔離標記，否則會顯示「已損毀，無法打開」。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
