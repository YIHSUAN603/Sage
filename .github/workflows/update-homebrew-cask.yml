name: Update Homebrew Cask

# Release 正式發佈（draft → published）後，自動更新 homebrew-tap 的 cask 版號與 sha256
# 也可從 Actions 頁面手動觸發，指定既有 release 的 tag
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: '要同步的 release tag（例如 v0.3.0）'
        required: true
        type: string

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: YIHSUAN603/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Regenerate cask
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/YIHSUAN603/Sage/releases/download/${TAG}"

          ARM_SHA=$(curl -fsSL "${BASE}/sage_${VERSION}_aarch64.dmg" | shasum -a 256 | cut -d' ' -f1)
          INTEL_SHA=$(curl -fsSL "${BASE}/sage_${VERSION}_x64.dmg" | shasum -a 256 | cut -d' ' -f1)

          cat > Casks/sage.rb <<EOF
          cask "sage" do
            arch arm: "aarch64", intel: "x64"

            version "${VERSION}"
            sha256 arm:   "${ARM_SHA}",
                   intel: "${INTEL_SHA}"

            url "https://github.com/YIHSUAN603/Sage/releases/download/v#{version}/sage_#{version}_#{arch}.dmg"
            name "Sage"
            desc "桌面 AI 小夥伴"
            homepage "https://github.com/YIHSUAN603/Sage"

            app "sage.app"

            zap trash: [
              "~/Library/Application Support/com.sage.app",
            ]
          end
          EOF

      - name: Commit and push
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sage.rb
          git diff --staged --quiet && echo "cask 無變更，跳過" && exit 0
          git commit -m "chore: 更新 sage cask 至 ${TAG#v}"
          git push
