name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Test
        run: npm test

  rust:
    # 三平台都要跑：語意快照 backend 以 #[cfg(target_os)] 分派——ubuntu 只會
    # 編到 stub，semantic_macos.rs / semantic_windows.rs 及其單元測試必須在
    # 對應的 runner 上才真的執行。
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libdbus-1-dev pkg-config libxcb1-dev libxrandr-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri-build 的 build.rs 要求 frontendDist（../dist）存在
      - name: Create dist placeholder
        run: mkdir -p dist

      - name: Test
        run: cargo test
        working-directory: src-tauri
