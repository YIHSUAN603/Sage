<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6FAF1" />
      <stop offset="1" stop-color="#D8E8CD" />
    </linearGradient>
    <linearGradient id="leaf-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A9C89B" />
      <stop offset="1" stop-color="#7FA36F" />
    </linearGradient>
    <radialGradient id="ground-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5E7F52" stop-opacity="0.28" />
      <stop offset="1" stop-color="#5E7F52" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- macOS-style rounded square (radius ≈ 232/1024) -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)" />

  <!-- Soft ground shadow under the character -->
  <ellipse cx="512" cy="836" rx="250" ry="46" fill="url(#ground-shadow)" />

  <!-- Sage character (from AvatarWindow.tsx, 96×96 viewBox), scaled 8× and centered -->
  <g transform="translate(128 116) scale(8)">
    <!-- 圓潤的鼠尾草葉身體 -->
    <path
      d="M48 12 C31 23 19 39 19 57 C19 74 32 86 48 86 C64 86 77 74 77 57 C77 39 65 23 48 12 Z"
      fill="url(#leaf-body)"
      stroke="#5E7F52"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <!-- 葉脈 -->
    <path
      d="M48 20 C46.5 36 46.5 60 48 80"
      stroke="#5E7F52"
      stroke-width="1.5"
      fill="none"
      opacity="0.3"
    />
    <path
      d="M47.5 34 C42 37 37 41 33 47 M47.6 46 C42 49 37 53 33.5 58"
      stroke="#5E7F52"
      stroke-width="1.2"
      fill="none"
      opacity="0.22"
    />
    <path
      d="M48.5 34 C54 37 59 41 63 47 M48.4 46 C54 49 59 53 62.5 58"
      stroke="#5E7F52"
      stroke-width="1.2"
      fill="none"
      opacity="0.22"
    />
    <!-- 頭頂小芽 -->
    <path
      d="M48 13 C48 8 50 4.5 54.5 3.5 C54.5 8.5 52 12 48 13 Z"
      fill="#8FB07E"
      stroke="#5E7F52"
      stroke-width="1.2"
      stroke-linejoin="round"
    />
    <path
      d="M48 13 C47 9 44.5 6.5 40.5 6.5 C41.5 10.5 44.5 12.8 48 13 Z"
      fill="#9FC08C"
      stroke="#5E7F52"
      stroke-width="1.2"
      stroke-linejoin="round"
    />
    <!-- 眼睛 -->
    <ellipse cx="38" cy="55" rx="4.2" ry="5.6" fill="#2F3A2E" />
    <ellipse cx="58" cy="55" rx="4.2" ry="5.6" fill="#2F3A2E" />
    <circle cx="39.6" cy="52.8" r="1.5" fill="#F4F8EF" />
    <circle cx="59.6" cy="52.8" r="1.5" fill="#F4F8EF" />
    <!-- 腮紅 -->
    <ellipse cx="30.5" cy="63" rx="4.2" ry="2.4" fill="#E8A79E" opacity="0.75" />
    <ellipse cx="65.5" cy="63" rx="4.2" ry="2.4" fill="#E8A79E" opacity="0.75" />
    <!-- 微笑 -->
    <path
      d="M44 66 Q48 70 52 66"
      stroke="#2F3A2E"
      stroke-width="2"
      stroke-linecap="round"
      fill="none"
    />
  </g>
</svg>
